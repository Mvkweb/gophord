name: Push Docs to Website

on:
  push:
    branches:
      - main
    tags:
      - 'v*'  # Trigger on version tags (v0.9.0, v1.0.0, etc.)
    paths:
      - 'pkg/**'
      - 'cmd/docgen/**'
      - '.github/workflows/push-docs.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g., v0.9.0 or dev)'
        required: false
        default: 'dev'

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Library (Gophord)
        uses: actions/checkout@v4
        with:
          path: gophord

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: gophord/go.sum

      - name: Determine Version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Building docs for version: $VERSION"

      - name: Generate docs.json
        run: |
          cd gophord
          go run ./cmd/docgen

      - name: Checkout Docs Website
        uses: actions/checkout@v4
        with:
          repository: Mvkweb/gophord-docs
          token: ${{ secrets.DOCS_PAT }}
          path: gophord-docs

      - name: Create docs directory
        run: mkdir -p gophord-docs/docs

      - name: Update versioned docs
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Copy versioned docs
          cp docs.json "gophord-docs/docs/${VERSION}.json"
          
          # Also update dev.json if this is from main branch (not a tag)
          if [[ "$VERSION" == "dev" ]]; then
            echo "Updated dev docs from main branch"
          else
            echo "Created release docs: ${VERSION}.json"
          fi

      - name: Update versions manifest
        run: |
          cd gophord-docs/docs
          
          # Generate versions.json from existing files
          echo '{"versions":[' > versions.json
          
          FIRST=true
          # Always include dev first
          if [[ -f "dev.json" ]]; then
            echo '{"version":"dev","label":"Main Branch","tag":"dev"}' >> versions.json
            FIRST=false
          fi
          
          # Add all versioned files in reverse order (newest first)
          for file in $(ls -r v*.json 2>/dev/null); do
            VERSION="${file%.json}"
            if [[ "$FIRST" == "false" ]]; then
              echo "," >> versions.json
            fi
            
            # Determine tag based on position
            if [[ "$FIRST" == "true" ]] || [[ $(ls -r v*.json | head -1) == "$file" ]]; then
              TAG="latest"
            else
              TAG="stable"
            fi
            
            echo "{\"version\":\"$VERSION\",\"label\":\"$VERSION\",\"tag\":\"$TAG\"}" >> versions.json
            FIRST=false
          done
          
          echo ']}' >> versions.json
          
          # Pretty print for readability
          cat versions.json

      - name: Push to Docs Repo
        run: |
          cd gophord-docs
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          VERSION="${{ steps.version.outputs.version }}"
          
          if [[ -n $(git status -s) ]]; then
            git add docs/
            if [[ "$VERSION" == "dev" ]]; then
              git commit -m "docs: update dev docs from gophord@${{ github.sha }}"
            else
              git commit -m "docs: add ${VERSION} release docs"
            fi
            git push
            echo "✅ Successfully pushed docs for ${VERSION}"
          else
            echo "ℹ️ No changes in documentation."
          fi
