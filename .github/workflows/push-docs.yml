name: Push Docs to Website

on:
  push:
    branches:
      - main
    tags:
      - 'v*'  # Trigger on version tags (v0.9.0, v1.0.0, etc.)
    paths:
      - 'pkg/**'
      - 'docs/**'
      - 'cmd/docgen/**'
      - 'scripts/generate_llms_txt.sh'
      - '.github/workflows/push-docs.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g., v0.9.0 or dev)'
        required: false
        default: 'dev'

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Library (Gophord)
        uses: actions/checkout@v4
        with:
          path: gophord

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: gophord/go.sum

      - name: Determine Version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Building docs for version: $VERSION"

      - name: Generate docs.json and llms-full.txt
        run: |
          cd gophord
          go run ./cmd/docgen
          chmod +x ./scripts/generate_llms_txt.sh
          ./scripts/generate_llms_txt.sh
