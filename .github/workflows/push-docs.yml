name: Push Docs to Website

on:
  push:
    branches:
      - main
    paths:
      - 'pkg/**'
      - 'cmd/docgen/**'
      - '.github/workflows/push-docs.yml'
  workflow_dispatch:

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Library (Gophord)
        uses: actions/checkout@v4
        with:
          path: gophord

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: gophord/go.sum

      - name: Generate docs.json
        run: |
          cd gophord
          go run ./cmd/docgen
          # This generates docs.json in the parent directory of cmd/docgen 
          # (relative to where main.go thought it was).
          # Let's verify where it landed based on our script logic.
          # Script logic: if "gophord.go" exists, output to "../docs.json" which might be outside repo?
          # Wait, let's just move it to a known location for clarity.
          # Re-running logic:
          # If we run from `gophord` root:
          # `go run ./cmd/docgen` -> main() runs.
          # checks packages.json (no), checks gophord.go (yes).
          # output path = "../docs.json".
          # So it puts it in the PARENT of `gophord` directory.
          # In GitHub Actions `checkout` with path `gophord`, the parent is the workspace root.
          # So `docs.json` should be at `./docs.json` (workspace root).

      - name: Checkout Docs Website
        uses: actions/checkout@v4
        with:
          repository: Mvkweb/gophord-docs
          token: ${{ secrets.DOCS_PAT }}
          path: gophord-docs

      - name: Update docs.json
        run: |
          # Copy from workspace root (generated by docgen) to docs repo
          cp docs.json gophord-docs/docs.json

      - name: Push to Docs Repo
        run: |
          cd gophord-docs
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check for changes
          if [[ -n $(git status -s) ]]; then
            git add docs.json
            git commit -m "feat: update api docs from gophord/gophord@${{ github.sha }}"
            git push
            echo "Successfully pushed updated docs."
          else
            echo "No changes in documentation."
          fi
